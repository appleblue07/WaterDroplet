<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Droplet</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <!-- 시작 화면 -->
    <div id = "startScreen">
        <div class="rain"></div>

        <div class="container">

            <div class="drop">💧</div>

            <h1>DROPLET</h1>

            <p>Every Drop Finds Its Way.</p>

            <button id = "playBtn">PLAY</button>

            <div class="menu">
                <a href="#">Records</a>
                <a href="#">Settings</a>
                <a href="#">Credits</a>
            </div>

        </div>

        <div class="water"></div>
    </div>


    <!-- 게임 화면 -->
    <div id="gameScreen">

    <div id="hud">

        <div id="sizeText">
            Size : 1
        </div>

        <div id="timer">
            Time : 00:00
        </div>

    </div>

    <div id="gameArea">

        <div id="player"></div>

    </div>

    <div id="help">

        Move : WASD / Arrow Keys

    </div>

</div>

    <script src="scr/scripts.js"></script>
</body>
</html>
